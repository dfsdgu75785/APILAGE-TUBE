<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APILAGE TUBE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #f0f0f0; }
    
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.5rem; height: 58px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #2a2a2a;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #ff4444; cursor: pointer; }
    .logo span { color: #aaa; font-size: 1rem; }
    .search-bar { flex: 1; max-width: 500px; }
    .search-bar input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 50px; padding: 0.5rem 1rem; color: white; }
    .btn { background: #ff4444; border: none; padding: 0.45rem 1rem; border-radius: 50px; color: white; cursor: pointer; }
    .btn-secondary { background: #2a2a2a; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: #ff4444; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    
    .main-layout { display: flex; }
    .sidebar { width: 220px; padding: 1rem 0; border-right: 1px solid #2a2a2a; min-height: calc(100vh - 58px); }
    .sidebar-item { padding: 0.55rem 1.2rem; cursor: pointer; color: #aaa; border-radius: 8px; margin: 0 0.5rem; }
    .sidebar-item:hover { background: #1a1a1a; color: white; }
    .content { flex: 1; padding: 1.5rem; }
    .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
    .live-badge { background: #ff4444; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin-left: 0.5rem; }
    
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .video-card { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #2a2a2a; }
    .video-card:hover { transform: translateY(-3px); border-color: #444; }
    .thumbnail { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .video-info { padding: 0.75rem; }
    .video-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.25rem; }
    .video-meta { font-size: 0.75rem; color: #777; }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; border: 1px solid #333; }
    .modal h2 { margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.3rem; }
    .field input, .field select { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 0.65rem; color: white; }
    .btn-primary { background: #ff4444; color: white; border: none; padding: 0.75rem; border-radius: 6px; cursor: pointer; width: 100%; }
    
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; }
    .toast { background: #111; border-left: 3px solid #ff4444; padding: 0.75rem 1rem; border-radius: 8px; margin-top: 0.5rem; }
    .loader { display: flex; justify-content: center; padding: 3rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #ff4444; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="app"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// CORRECT SUPABASE CREDENTIALS - FIXED
// ============================================================
const SUPABASE_URL = 'https://jgjttaalzpxhjxhtxkir.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnanR0YWFsenB4aGp4aHR4a2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjM5OTIsImV4cCI6MjA5MDMzOTk5Mn0.WCjIpGL_xXIWXKA8a-GLWCoYXqHjy1BSPhRKm_PxGiA';
// ============================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let allVideos = [];
let currentCategory = 'all';
let selectedFile = null;
let selectedThumb = null;

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatViews(n) { if (!n) return '0'; if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'; if (n >= 1000) return (n/1000).toFixed(1) + 'K'; return String(n); }
function getTimeAgo(ts) { if (!ts) return ''; const s = Math.floor((Date.now() - new Date(ts))/1000); if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago'; if(s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

async function loadVideos() {
  const grid = document.getElementById('videoGrid');
  const loader = document.getElementById('loader');
  if(loader) loader.style.display = 'flex';
  
  let query = sb.from('videos').select('*').order('created_at', { ascending: false });
  if(currentCategory !== 'all') query = query.eq('category', currentCategory);
  
  const { data, error } = await query;
  if(loader) loader.style.display = 'none';
  if(error) { 
    console.error('Load error:', error);
    showToast('Error loading videos'); 
    return; 
  }
  
  allVideos = data || [];
  if(!grid) return;
  
  if(allVideos.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:#777">No videos yet. Be the first to upload!</div>';
    return;
  }
  
  grid.innerHTML = allVideos.map(v => `
    <div class="video-card" onclick="openPlayer('${v.id}')">
      <div class="thumbnail">
        <img src="${v.thumbnail_url || 'https://placehold.co/480x270/1a1a1a/fff?text=🎬'}" onerror="this.src='https://placehold.co/480x270/1a1a1a/fff?text=🎬'">
      </div>
      <div class="video-info">
        <div class="video-title">${escapeHtml(v.title)}</div>
        <div class="video-meta">${escapeHtml(v.username || 'Unknown')} • ${formatViews(v.views)} views • ${getTimeAgo(v.created_at)}</div>
      </div>
    </div>
  `).join('');
}

async function openPlayer(videoId) {
  const video = allVideos.find(v => v.id === videoId);
  if(!video) return;
  await sb.from('videos').update({ views: (video.views||0)+1 }).eq('id', videoId);
  window.open(video.video_url, '_blank');
}

function openUpload() {
  if(!currentUser) { openAuth(); return; }
  document.getElementById('uploadModal').classList.add('open');
}

function closeUpload() { 
  document.getElementById('uploadModal').classList.remove('open'); 
  selectedFile = null; 
  selectedThumb = null;
  document.getElementById('uploadTitle').value = ''; 
  document.getElementById('uploadDesc').value = ''; 
}

function handleFileSelect(input) { 
  if(input.files && input.files[0]) { 
    selectedFile = input.files[0]; 
    showToast('Selected: '+selectedFile.name); 
  } 
}

function handleThumbSelect(input) {
  if(input.files && input.files[0]) {
    selectedThumb = input.files[0];
    showToast('Thumbnail selected: '+selectedThumb.name);
  }
}

async function uploadVideo() {
  if(!selectedFile) { showToast('Select a video file'); return; }
  const title = document.getElementById('uploadTitle').value.trim();
  if(!title) { showToast('Enter a title'); return; }
  
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; 
  btn.textContent = 'Uploading...';
  
  try {
    // Upload video to Supabase Storage
    const ext = selectedFile.name.split('.').pop();
    const fileName = `${currentUser.id}/${Date.now()}.${ext}`;
    
    const { error: uploadError } = await sb.storage.from('videos').upload(fileName, selectedFile);
    if(uploadError) throw new Error(uploadError.message);
    
    const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(fileName);
    
    // Upload thumbnail if provided
    let thumbnailUrl = null;
    if(selectedThumb) {
      const thumbExt = selectedThumb.name.split('.').pop();
      const thumbName = `${currentUser.id}/thumb_${Date.now()}.${thumbExt}`;
      const { error: thumbError } = await sb.storage.from('thumbnails').upload(thumbName, selectedThumb);
      if(!thumbError) {
        const { data: thumbData } = sb.storage.from('thumbnails').getPublicUrl(thumbName);
        thumbnailUrl = thumbData.publicUrl;
      }
    }
    
    // Save to database (without avatar_url column)
    const { error: dbError } = await sb.from('videos').insert({
      user_id: currentUser.id,
      username: currentUser.email?.split('@')[0] || 'User',
      title: title,
      description: document.getElementById('uploadDesc').value || '',
      category: document.getElementById('uploadCat').value,
      video_url: publicUrl,
      thumbnail_url: thumbnailUrl,
      views: 0,
      likes: 0
    });
    
    if(dbError) throw new Error(dbError.message);
    
    showToast('Video uploaded successfully!');
    closeUpload();
    loadVideos();
  } catch(err) { 
    showToast('Upload failed: '+err.message); 
    console.error('Upload error:', err);
  } finally { 
    btn.disabled = false; 
    btn.textContent = 'Upload Video'; 
  }
}

// Auth functions
async function openAuth() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'authModal';
  modal.innerHTML = `
    <div class="modal">
      <h2>APILAGE TUBE</h2>
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="switchTab('signin')" id="signinTab" style="flex:1; padding:10px; background:#ff4444; border:none; border-radius:40px; color:white;">Sign In</button>
        <button onclick="switchTab('signup')" id="signupTab" style="flex:1; padding:10px; background:#2a2a2a; border:none; border-radius:40px; color:#aaa;">Sign Up</button>
      </div>
      <div id="signinForm">
        <div class="field"><label>Email</label><input type="email" id="signinEmail" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="signinPassword" placeholder="••••••••"></div>
        <button class="btn-primary" onclick="handleSignIn()">Sign In</button>
      </div>
      <div id="signupForm" style="display:none;">
        <div class="field"><label>Username</label><input type="text" id="signupName" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters"></div>
        <button class="btn-primary" onclick="handleSignUp()">Create Account</button>
      </div>
      <div id="authError" style="color:#ff4444; margin-top:10px; text-align:center"></div>
      <button class="btn-primary" style="margin-top:10px; background:#2a2a2a;" onclick="closeAuthModal()">Cancel</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function closeAuthModal() { document.getElementById('authModal')?.remove(); }

window.switchTab = function(tab) {
  const signinForm = document.getElementById('signinForm');
  const signupForm = document.getElementById('signupForm');
  const signinTab = document.getElementById('signinTab');
  const signupTab = document.getElementById('signupTab');
  
  if(tab === 'signin') {
    signinForm.style.display = 'block';
    signupForm.style.display = 'none';
    signinTab.style.background = '#ff4444';
    signinTab.style.color = 'white';
    signupTab.style.background = '#2a2a2a';
    signupTab.style.color = '#aaa';
  } else {
    signinForm.style.display = 'none';
    signupForm.style.display = 'block';
    signinTab.style.background = '#2a2a2a';
    signinTab.style.color = '#aaa';
    signupTab.style.background = '#ff4444';
    signupTab.style.color = 'white';
  }
};

window.handleSignIn = async function() {
  const email = document.getElementById('signinEmail').value.trim();
  const password = document.getElementById('signinPassword').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) { 
    document.getElementById('authError').innerText = error.message; 
    return; 
  }
  closeAuthModal();
  showToast('Signed in!');
  setTimeout(() => location.reload(), 500);
};

window.handleSignUp = async function() {
  const username = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if(password.length < 6) { 
    document.getElementById('authError').innerText = 'Password must be at least 6 characters'; 
    return; 
  }
  const { data, error } = await sb.auth.signUp({ 
    email, 
    password, 
    options: { data: { username } } 
  });
  if(error) { 
    document.getElementById('authError').innerText = error.message; 
    return; 
  }
  showToast('Account created! Please sign in.');
  switchTab('signin');
  document.getElementById('signinEmail').value = email;
};

async function signOut() { 
  await sb.auth.signOut(); 
  location.reload(); 
}

function updateAuthUI() {
  const authBtn = document.getElementById('authBtn');
  const userMenu = document.getElementById('userMenu');
  const userAvatar = document.getElementById('userAvatar');
  
  if(currentUser) { 
    if(authBtn) authBtn.style.display = 'none'; 
    if(userMenu) userMenu.style.display = 'block'; 
    if(userAvatar) userAvatar.textContent = currentUser.email?.charAt(0).toUpperCase() || 'U'; 
  } else { 
    if(authBtn) authBtn.style.display = 'block'; 
    if(userMenu) userMenu.style.display = 'none'; 
  }
}

function toggleAvatarMenu() { 
  document.getElementById('avatarMenu')?.classList.toggle('open'); 
}

function goHome() { 
  currentCategory = 'all'; 
  document.getElementById('sectionHeading').innerHTML = 'All Videos <span class="live-badge">LIVE</span>'; 
  loadVideos(); 
}

function setCategory(cat) { 
  currentCategory = cat; 
  document.getElementById('sectionHeading').innerHTML = cat === 'all' ? 'All Videos' : cat.charAt(0).toUpperCase() + cat.slice(1); 
  loadVideos(); 
}

function filterMyVideos() { 
  if(!currentUser) { openAuth(); return; } 
  const myVids = allVideos.filter(v => v.user_id === currentUser.id); 
  const grid = document.getElementById('videoGrid'); 
  if(myVids.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:#777">You haven\'t uploaded any videos yet.</div>';
  } else {
    grid.innerHTML = myVids.map(v => `
      <div class="video-card" onclick="openPlayer('${v.id}')">
        <div class="thumbnail"><img src="${v.thumbnail_url || 'https://placehold.co/480x270/1a1a1a/fff?text=🎬'}" onerror="this.src='https://placehold.co/480x270/1a1a1a/fff?text=🎬'"></div>
        <div class="video-info"><div class="video-title">${escapeHtml(v.title)}</div><div class="video-meta">${formatViews(v.views)} views</div></div>
      </div>
    `).join('');
  }
  document.getElementById('sectionHeading').innerHTML = 'My Videos'; 
}

async function openTrending() { 
  const { data } = await sb.from('videos').select('*').order('views', { ascending: false }).limit(20); 
  if(data) { 
    const grid = document.getElementById('videoGrid'); 
    grid.innerHTML = data.map(v => `
      <div class="video-card" onclick="openPlayer('${v.id}')">
        <div class="thumbnail"><img src="${v.thumbnail_url || 'https://placehold.co/480x270/1a1a1a/fff?text=🎬'}" onerror="this.src='https://placehold.co/480x270/1a1a1a/fff?text=🎬'"></div>
        <div class="video-info"><div class="video-title">${escapeHtml(v.title)}</div><div class="video-meta">${formatViews(v.views)} views</div></div>
      </div>
    `).join('');
  }
  document.getElementById('sectionHeading').innerHTML = '🔥 Trending'; 
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if(session) currentUser = session.user;
  
  sb.auth.onAuthStateChange((event, session) => { 
    currentUser = session?.user || null; 
    updateAuthUI(); 
    if(event === 'SIGNED_IN' || event === 'SIGNED_OUT') loadVideos(); 
  });
  
  renderApp();
}

function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <nav>
      <div class="logo" onclick="goHome()">APILAGE <span>TUBE</span></div>
      <div class="search-bar"><input type="text" id="searchInput" placeholder="Search videos..."></div>
      <div class="nav-actions">
        <button class="btn" onclick="openUpload()">+ Upload</button>
        <div id="authBtn"><button class="btn btn-secondary" onclick="openAuth()">Sign In</button></div>
        <div id="userMenu" style="display:none; position:relative;">
          <div class="avatar" id="userAvatar" onclick="toggleAvatarMenu()"></div>
          <div id="avatarMenu" style="position:absolute; top:42px; right:0; background:#111; border:1px solid #333; border-radius:10px; padding:0.5rem; min-width:150px; z-index:200; display:none;">
            <div class="sidebar-item" onclick="filterMyVideos()">My Videos</div>
            <div class="sidebar-item" onclick="signOut()" style="color:#ff4444;">Sign Out</div>
          </div>
        </div>
      </div>
    </nav>
    <div class="main-layout">
      <div class="sidebar">
        <div class="sidebar-item" onclick="goHome()">🏠 Home</div>
        <div class="sidebar-item" onclick="openTrending()">🔥 Trending</div>
        <div class="sidebar-item" onclick="filterMyVideos()">📺 My Videos</div>
        <div style="border-top:1px solid #2a2a2a; margin:0.7rem 0;"></div>
        <div style="font-size:0.75rem; color:#777; padding:0.3rem 1.2rem;">Categories</div>
        <div class="sidebar-item" onclick="setCategory('music')">🎵 Music</div>
        <div class="sidebar-item" onclick="setCategory('gaming')">🎮 Gaming</div>
        <div class="sidebar-item" onclick="setCategory('tech')">💻 Tech</div>
        <div class="sidebar-item" onclick="setCategory('education')">📚 Education</div>
        <div class="sidebar-item" onclick="setCategory('sports')">⚽ Sports</div>
        <div class="sidebar-item" onclick="setCategory('vlogs')">📹 Vlogs</div>
      </div>
      <div class="content">
        <div style="display:flex; align-items:center; margin-bottom:1rem;">
          <span class="section-title" id="sectionHeading">All Videos</span>
          <span class="live-badge">LIVE</span>
        </div>
        <div id="videoGrid" class="video-grid"></div>
        <div id="loader" class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  `;
  
  // Upload Modal
  const uploadModal = document.createElement('div');
  uploadModal.className = 'modal-overlay';
  uploadModal.id = 'uploadModal';
  uploadModal.innerHTML = `
    <div class="modal">
      <h2>Upload Video</h2>
      <div class="field"><label>Title *</label><input type="text" id="uploadTitle" placeholder="Video title"></div>
      <div class="field"><label>Description</label><input type="text" id="uploadDesc" placeholder="Description"></div>
      <div class="field"><label>Category</label>
        <select id="uploadCat">
          <option value="other">Other</option><option value="music">Music</option>
          <option value="gaming">Gaming</option><option value="tech">Tech</option>
          <option value="education">Education</option><option value="sports">Sports</option>
          <option value="vlogs">Vlogs</option><option value="comedy">Comedy</option>
        </select>
      </div>
      <div class="field"><label>Video File</label><input type="file" id="videoFile" accept="video/*" onchange="handleFileSelect(this)"></div>
      <div class="field"><label>Thumbnail (optional)</label><input type="file" id="thumbFile" accept="image/*" onchange="handleThumbSelect(this)"></div>
      <button class="btn-primary" id="uploadBtn" onclick="uploadVideo()">Upload Video</button>
      <button class="btn-primary" style="margin-top:10px; background:#2a2a2a;" onclick="closeUpload()">Cancel</button>
    </div>
  `;
  document.body.appendChild(uploadModal);
  
  updateAuthUI();
  loadVideos();
}

document.addEventListener('click', (e) => { 
  const menu = document.getElementById('avatarMenu'); 
  if(menu && !e.target.closest('#userMenu')) menu.classList.remove('open'); 
});

init();
</script>
</body>
</html>
