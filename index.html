<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APILAGE TUBE 2.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #222; --bg4: #2a2a2a;
      --border: #2a2a2a; --border2: #3a3a3a; --text: #fff; --text2: #aaa;
      --text3: #777; --accent: #ff4444; --accent2: #ff6666; --blue: #3ea6ff;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .navbar {
      position: sticky; top: 0; z-index: 100; display: flex; align-items: center;
      justify-content: space-between; padding: 0 1.5rem; height: 56px;
      background: rgba(15,15,15,0.98); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 1.5rem; font-weight: 700; cursor: pointer; }
    .logo span { color: var(--accent); }
    .search-container {
      display: flex; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 40px; overflow: hidden; width: 400px;
    }
    .search-container input {
      flex: 1; background: none; border: none; padding: 0.6rem 1rem;
      color: var(--text); outline: none;
    }
    .search-container button {
      background: var(--bg3); border: none; padding: 0.6rem 1.2rem;
      color: var(--text2); cursor: pointer;
    }
    .upload-btn, .auth-btn {
      background: var(--bg3); border: none; padding: 0.5rem 1rem;
      border-radius: 40px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .upload-btn { background: var(--accent); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; cursor: pointer;
    }
    .sidebar {
      position: fixed; left: 0; top: 56px; width: 240px;
      height: calc(100vh - 56px); background: var(--bg); overflow-y: auto;
      padding: 0.8rem 0; border-right: 1px solid var(--border);
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 1rem; padding: 0.6rem 1.2rem;
      cursor: pointer; color: var(--text2); border-radius: 10px;
      margin: 0 0.5rem; transition: all 0.2s;
    }
    .sidebar-item:hover { background: var(--bg3); color: var(--text); }
    .sidebar-item.active { background: var(--accent-dim); color: var(--accent); }
    .sidebar-item i { width: 22px; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 0.8rem 1rem; }
    .sidebar-label { font-size: 0.7rem; color: var(--text3); padding: 0.5rem 1.2rem; }
    .main-content { margin-left: 240px; padding: 1.5rem; min-height: calc(100vh - 56px); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-title { font-size: 1.3rem; font-weight: 600; }
    .live-badge { background: var(--accent); font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; margin-left: 10px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .video-card {
      background: var(--bg2); border-radius: 12px; overflow: hidden;
      cursor: pointer; border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    .video-card:hover { transform: translateY(-4px); border-color: var(--border2); }
    .video-thumb { width: 100%; aspect-ratio: 16/9; background: var(--bg3); position: relative; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: var(--bg4); }
    .thumb-duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); border-radius: 4px; padding: 2px 5px; font-size: 0.7rem; }
    .video-info { padding: 0.75rem; display: flex; gap: 0.6rem; }
    .channel-avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .video-details { flex: 1; }
    .video-title { font-size: 0.9rem; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.25rem; }
    .video-meta { font-size: 0.75rem; color: var(--text3); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border-radius: 16px; padding: 2rem;
      width: 100%; max-width: 450px; border: 1px solid var(--border);
    }
    .modal h2 { margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.3rem; }
    .field input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.7rem; color: var(--text);
    }
    .btn-primary {
      background: var(--accent); color: white; border: none;
      padding: 0.7rem; border-radius: 40px; font-weight: 600;
      cursor: pointer; width: 100%;
    }
    .btn-secondary {
      background: var(--bg3); color: var(--text); border: none;
      padding: 0.7rem; border-radius: 40px; cursor: pointer; width: 100%;
    }
    .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .auth-tab {
      flex: 1; text-align: center; padding: 0.5rem; cursor: pointer;
      border-radius: 40px; background: var(--bg3); color: var(--text2);
    }
    .auth-tab.active { background: var(--accent); color: white; }
    .toast-container {
      position: fixed; bottom: 1rem; right: 1rem; z-index: 1000;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      background: var(--bg2); border-left: 3px solid var(--accent);
      padding: 0.7rem 1rem; border-radius: 8px; animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .loader { display: flex; justify-content: center; padding: 2rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-text { color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }
    @media (max-width: 768px) { .sidebar { transform: translateX(-240px); } .main-content { margin-left: 0; } .search-container { width: 200px; } }
  </style>
</head>
<body>

<div id="app"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// HARDCODED SUPABASE CREDENTIALS

const SUPABASE_URL = 'https://jgjttaalzpxhjxhtxkir.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnanR0YWFsenB4aGp4aHR4a2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjM5OTIsImV4cCI6MjA5MDMzOTk5Mn0.WCjIpGL_xXIWXKA8a-GLWCoYXqHjy1BSPhRKm_PxGiA';
// ============================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let allVideos = [];
let currentCategory = 'all';
let currentSearch = '';

// Toast helper
function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function formatViews(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function getTimeAgo(ts) {
  if (!ts) return '';
  const seconds = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return Math.floor(seconds/60) + 'm ago';
  if (seconds < 86400) return Math.floor(seconds/3600) + 'h ago';
  if (seconds < 604800) return Math.floor(seconds/86400) + 'd ago';
  return Math.floor(seconds/604800) + 'w ago';
}

// Load videos
async function loadVideos() {
  const grid = document.getElementById('videoGrid');
  const loader = document.getElementById('loader');
  if (loader) loader.style.display = 'flex';
  
  let query = sb.from('videos').select('*').order('created_at', { ascending: false });
  if (currentCategory !== 'all') query = query.eq('category', currentCategory);
  if (currentSearch) query = query.ilike('title', `%${currentSearch}%`);
  
  const { data, error } = await query;
  if (loader) loader.style.display = 'none';
  
  if (error) {
    showToast('Error loading videos: ' + error.message, 'error');
    return;
  }
  
  allVideos = data || [];
  
  if (!grid) return;
  
  if (allVideos.length === 0) {
    grid.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text3)"><i class="fas fa-video" style="font-size:3rem;margin-bottom:1rem;display:block"></i>No videos yet<br>Be the first to upload!</div>`;
    return;
  }
  
  grid.innerHTML = allVideos.map(v => `
    <div class="video-card" onclick="openPlayer('${v.id}')">
      <div class="video-thumb">
        <div class="thumb-placeholder"><i class="fas fa-play-circle"></i></div>
        <div class="thumb-duration">${v.duration || '0:00'}</div>
      </div>
      <div class="video-info">
        <div class="channel-avatar-sm">${(v.username || 'U').charAt(0).toUpperCase()}</div>
        <div class="video-details">
          <div class="video-title">${escHtml(v.title)}</div>
          <div class="video-meta">${escHtml(v.username || 'Unknown')} • ${formatViews(v.views)} views • ${getTimeAgo(v.created_at)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// Open video player
window.openPlayer = async function(videoId) {
  const video = allVideos.find(v => v.id === videoId);
  if (!video) return;
  
  // Increment view count
  await sb.from('videos').update({ views: (video.views || 0) + 1 }).eq('id', videoId);
  video.views = (video.views || 0) + 1;
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'playerModal';
  modal.innerHTML = `
    <div class="modal" style="max-width: 900px; max-height: 90vh; overflow-y: auto;">
      <div style="margin-bottom: 1rem;">
        <video controls autoplay style="width: 100%; border-radius: 12px;" src="${video.video_url}"></video>
      </div>
      <h3>${escHtml(video.title)}</h3>
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 0.5rem 0; flex-wrap: wrap; gap: 0.5rem;">
        <div style="color: var(--text2); font-size: 0.85rem;">
          ${formatViews(video.views)} views • ${getTimeAgo(video.created_at)} • ${video.category || 'other'}
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="upload-btn" id="likeBtn" style="background: var(--bg3);"><i class="fas fa-thumbs-up"></i> <span id="likeCount">${video.likes || 0}</span></button>
          <button class="upload-btn" id="shareBtn" style="background: var(--bg3);"><i class="fas fa-share"></i> Share</button>
          ${currentUser && currentUser.id === video.user_id ? `<button class="upload-btn" id="deleteBtn" style="background: var(--accent);"><i class="fas fa-trash"></i> Delete</button>` : ''}
        </div>
      </div>
      <div style="background: var(--bg3); padding: 0.8rem; border-radius: 12px; margin: 0.5rem 0;">
        <div style="font-weight: 600;">${escHtml(video.username || 'Unknown User')}</div>
        <div style="font-size: 0.85rem; color: var(--text2); margin-top: 0.3rem;">${escHtml(video.description || 'No description')}</div>
      </div>
      <div style="margin-top: 1rem;">
        <h4>Comments</h4>
        <div id="commentsList" style="margin: 0.5rem 0; max-height: 300px; overflow-y: auto;"></div>
        ${currentUser ? `
          <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <input type="text" id="commentInput" placeholder="Add a comment..." style="flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 40px; padding: 0.6rem 1rem; color: var(--text);">
            <button class="btn-primary" style="width: auto; padding: 0.6rem 1.2rem;" onclick="postComment('${video.id}')">Post</button>
          </div>
        ` : '<p style="color: var(--text2);"><button class="btn-secondary" onclick="openAuthModal()">Sign in</button> to comment</p>'}
      </div>
      <button class="btn-secondary" style="margin-top: 1rem;" onclick="closePlayerModal()">Close</button>
    </div>
  `;
  document.body.appendChild(modal);
  
  // Load comments
  await loadComments(video.id);
  
  // Like button
  document.getElementById('likeBtn')?.addEventListener('click', async () => {
    if (!currentUser) { openAuthModal(); return; }
    const hasLiked = await sb.from('video_likes').select('*').eq('user_id', currentUser.id).eq('video_id', video.id).single();
    if (hasLiked.data) {
      await sb.from('video_likes').delete().eq('user_id', currentUser.id).eq('video_id', video.id);
      await sb.from('videos').update({ likes: (video.likes || 0) - 1 }).eq('id', video.id);
      video.likes = (video.likes || 0) - 1;
    } else {
      await sb.from('video_likes').insert({ user_id: currentUser.id, video_id: video.id });
      await sb.from('videos').update({ likes: (video.likes || 0) + 1 }).eq('id', video.id);
      video.likes = (video.likes || 0) + 1;
    }
    document.getElementById('likeCount').innerText = video.likes;
    showToast(video.likes ? 'Liked!' : 'Unliked', 'success');
  });
  
  document.getElementById('shareBtn')?.addEventListener('click', () => {
    navigator.clipboard?.writeText(window.location.href);
    showToast('Link copied!', 'success');
  });
  
  document.getElementById('deleteBtn')?.addEventListener('click', async () => {
    if (confirm('Delete this video? This cannot be undone.')) {
      await sb.from('videos').delete().eq('id', video.id);
      closePlayerModal();
      loadVideos();
      showToast('Video deleted', 'success');
    }
  });
};

window.closePlayerModal = function() {
  document.getElementById('playerModal')?.remove();
};

async function loadComments(videoId) {
  const { data } = await sb.from('comments').select('*').eq('video_id', videoId).order('created_at', { ascending: false });
  const container = document.getElementById('commentsList');
  if (!container) return;
  if (!data || data.length === 0) {
    container.innerHTML = '<div style="color: var(--text3); text-align: center; padding: 1rem;">No comments yet. Be the first!</div>';
    return;
  }
  container.innerHTML = data.map(c => `
    <div style="background: var(--bg3); border-radius: 8px; padding: 0.6rem; margin-bottom: 0.5rem;">
      <div style="font-weight: 600; font-size: 0.85rem;">${escHtml(c.username)}</div>
      <div style="font-size: 0.85rem; margin-top: 0.2rem;">${escHtml(c.text)}</div>
      <div style="font-size: 0.7rem; color: var(--text3); margin-top: 0.3rem;">${getTimeAgo(c.created_at)}</div>
    </div>
  `).join('');
}

window.postComment = async function(videoId) {
  const input = document.getElementById('commentInput');
  const text = input?.value.trim();
  if (!text) return;
  const { error } = await sb.from('comments').insert({
    video_id: videoId,
    user_id: currentUser.id,
    username: currentUser.user_metadata?.username || currentUser.email?.split('@')[0] || 'User',
    text: text
  });
  if (error) {
    showToast('Error posting comment: ' + error.message, 'error');
    return;
  }
  input.value = '';
  await loadComments(videoId);
  showToast('Comment posted!', 'success');
};

// Auth functions
window.openAuthModal = function() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'authModal';
  modal.innerHTML = `
    <div class="modal">
      <h2>APILAGE TUBE</h2>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('signin')">Sign In</div>
        <div class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div>
      </div>
      <div id="signinForm">
        <div class="field"><label>Email</label><input type="email" id="signinEmail" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="signinPassword" placeholder="••••••••"></div>
        <button class="btn-primary" onclick="handleSignIn()">Sign In</button>
      </div>
      <div id="signupForm" style="display: none;">
        <div class="field"><label>Username</label><input type="text" id="signupName" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters"></div>
        <button class="btn-primary" onclick="handleSignUp()">Create Account</button>
      </div>
      <div id="authError" class="error-text"></div>
      <button class="btn-secondary" style="margin-top: 1rem;" onclick="closeAuthModal()">Cancel</button>
    </div>
  `;
  document.body.appendChild(modal);
};

window.closeAuthModal = function() {
  document.getElementById('authModal')?.remove();
};

window.switchAuthTab = function(tab) {
  const signinForm = document.getElementById('signinForm');
  const signupForm = document.getElementById('signupForm');
  const tabs = document.querySelectorAll('.auth-tab');
  if (tab === 'signin') {
    signinForm.style.display = 'block';
    signupForm.style.display = 'none';
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
  } else {
    signinForm.style.display = 'none';
    signupForm.style.display = 'block';
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
  }
};

window.handleSignIn = async function() {
  const email = document.getElementById('signinEmail').value.trim();
  const password = document.getElementById('signinPassword').value;
  const errorDiv = document.getElementById('authError');
  
  if (!email || !password) {
    errorDiv.innerText = 'Please enter email and password';
    return;
  }
  
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errorDiv.innerText = error.message;
    return;
  }
  
  if (data.user) {
    currentUser = data.user;
    closeAuthModal();
    updateAuthUI();
    loadVideos();
    showToast(`Welcome back, ${currentUser.email}!`, 'success');
  }
};

window.handleSignUp = async function() {
  const username = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errorDiv = document.getElementById('authError');
  
  if (!username || !email || !password) {
    errorDiv.innerText = 'Please fill all fields';
    return;
  }
  if (password.length < 6) {
    errorDiv.innerText = 'Password must be at least 6 characters';
    return;
  }
  
  const { data, error } = await sb.auth.signUp({ 
    email, 
    password,
    options: { data: { username } }
  });
  
  if (error) {
    errorDiv.innerText = error.message;
    return;
  }
  
  if (data.user) {
    // Create profile
    await sb.from('profiles').upsert({ id: data.user.id, username: username });
    showToast('Account created! Please sign in.', 'success');
    switchAuthTab('signin');
    document.getElementById('signinEmail').value = email;
  }
};

window.signOut = async function() {
  await sb.auth.signOut();
  currentUser = null;
  updateAuthUI();
  loadVideos();
  showToast('Signed out', 'info');
};

function updateAuthUI() {
  const authContainer = document.getElementById('authContainer');
  if (!authContainer) return;
  
  if (currentUser) {
    authContainer.innerHTML = `
      <div class="avatar" onclick="toggleUserMenu()">
        ${currentUser.email?.charAt(0).toUpperCase() || 'U'}
      </div>
      <div id="userMenu" style="display: none; position: absolute; top: 50px; right: 1rem; background: var(--bg2); border-radius: 12px; padding: 0.5rem; z-index: 200;">
        <div class="sidebar-item" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Sign Out</div>
      </div>
    `;
  } else {
    authContainer.innerHTML = `<button class="auth-btn" onclick="openAuthModal()"><i class="fas fa-sign-in-alt"></i> Sign In</button>`;
  }
}

window.toggleUserMenu = function() {
  const menu = document.getElementById('userMenu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
};

// Navigation
window.goHome = function() {
  currentCategory = 'all';
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('pageTitle').innerHTML = 'All Videos <span class="live-badge">LIVE</span>';
  loadVideos();
  updateActiveNav('home');
};

window.goTrending = async function() {
  const loader = document.getElementById('loader');
  if (loader) loader.style.display = 'flex';
  const { data } = await sb.from('videos').select('*').order('views', { ascending: false }).limit(20);
  if (loader) loader.style.display = 'none';
  allVideos = data || [];
  const grid = document.getElementById('videoGrid');
  if (grid && allVideos.length) {
    grid.innerHTML = allVideos.map(v => `
      <div class="video-card" onclick="openPlayer('${v.id}')">
        <div class="video-thumb"><div class="thumb-placeholder"><i class="fas fa-play-circle"></i></div><div class="thumb-duration">${v.duration || '0:00'}</div></div>
        <div class="video-info"><div class="channel-avatar-sm">${(v.username || 'U').charAt(0).toUpperCase()}</div><div class="video-details"><div class="video-title">${escHtml(v.title)}</div><div class="video-meta">${escHtml(v.username)} • ${formatViews(v.views)} views</div></div></div>
      </div>
    `).join('');
  }
  document.getElementById('pageTitle').innerHTML = 'Trending 🔥';
  updateActiveNav('trending');
};

window.filterMyVideos = function() {
  if (!currentUser) { openAuthModal(); return; }
  const myVideos = allVideos.filter(v => v.user_id === currentUser.id);
  const grid = document.getElementById('videoGrid');
  if (myVideos.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text3)">You haven\'t uploaded any videos yet.</div>';
  } else {
    grid.innerHTML = myVideos.map(v => `
      <div class="video-card" onclick="openPlayer('${v.id}')">
        <div class="video-thumb"><div class="thumb-placeholder"><i class="fas fa-play-circle"></i></div><div class="thumb-duration">${v.duration || '0:00'}</div></div>
        <div class="video-info"><div class="channel-avatar-sm">${(v.username || 'U').charAt(0).toUpperCase()}</div><div class="video-details"><div class="video-title">${escHtml(v.title)}</div><div class="video-meta">${formatViews(v.views)} views</div></div></div>
      </div>
    `).join('');
  }
  document.getElementById('pageTitle').innerHTML = 'My Videos';
  updateActiveNav('myvideos');
};

function updateActiveNav(active) {
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.classList.remove('active');
  });
}

// Upload modal
window.openUploadModal = function() {
  if (!currentUser) { openAuthModal(); return; }
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'uploadModal';
  modal.innerHTML = `
    <div class="modal">
      <h2><i class="fas fa-upload"></i> Upload Video</h2>
      <div class="field"><label>Title *</label><input type="text" id="uploadTitle" placeholder="Give your video a title"></div>
      <div class="field"><label>Description</label><input type="text" id="uploadDesc" placeholder="Tell viewers about this video"></div>
      <div class="field"><label>Category</label>
        <select id="uploadCat" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.7rem;color:var(--text);">
          <option value="other">Other</option><option value="music">Music</option><option value="gaming">Gaming</option>
          <option value="tech">Tech</option><option value="education">Education</option><option value="sports">Sports</option>
          <option value="vlogs">Vlogs</option><option value="comedy">Comedy</option><option value="news">News</option>
        </select>
      </div>
      <div class="field"><label>Video File</label><input type="file" id="videoFile" accept="video/*"></div>
      <div id="uploadProgress" style="display:none;margin:0.5rem 0;"><div style="background:var(--bg3);border-radius:40px;height:6px;"><div id="progressBar" style="width:0%;height:100%;background:var(--accent);border-radius:40px;"></div></div><div id="progressText" style="font-size:0.75rem;margin-top:0.3rem;">Uploading...</div></div>
      <button class="btn-primary" id="doUploadBtn">Upload Video</button>
      <button class="btn-secondary" style="margin-top:0.5rem;" onclick="closeUploadModal()">Cancel</button>
      <div id="uploadError" class="error-text"></div>
    </div>
  `;
  document.body.appendChild(modal);
  
  document.getElementById('doUploadBtn').onclick = async () => {
    const title = document.getElementById('uploadTitle').value.trim();
    if (!title) { document.getElementById('uploadError').innerText = 'Title is required'; return; }
    const file = document.getElementById('videoFile').files[0];
    if (!file) { document.getElementById('uploadError').innerText = 'Please select a video file'; return; }
    if (!file.type.startsWith('video/')) { document.getElementById('uploadError').innerText = 'Please select a valid video file'; return; }
    
    const btn = document.getElementById('doUploadBtn');
    btn.disabled = true;
    btn.textContent = 'Uploading...';
    document.getElementById('uploadProgress').style.display = 'block';
    
    const ext = file.name.split('.').pop();
    const fileName = `${currentUser.id}/${Date.now()}.${ext}`;
    
    const { error: uploadError } = await sb.storage.from('videos').upload(fileName, file);
    if (uploadError) {
      document.getElementById('uploadError').innerText = 'Upload failed: ' + uploadError.message;
      btn.disabled = false;
      btn.textContent = 'Upload Video';
      return;
    }
    
    const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(fileName);
    
    const { error: dbError } = await sb.from('videos').insert({
      user_id: currentUser.id,
      username: currentUser.user_metadata?.username || currentUser.email?.split('@')[0] || 'User',
      title: title,
      description: document.getElementById('uploadDesc').value,
      category: document.getElementById('uploadCat').value,
      video_url: publicUrl,
      views: 0,
      likes: 0
    });
    
    if (dbError) {
      document.getElementById('uploadError').innerText = 'Database error: ' + dbError.message;
      btn.disabled = false;
      btn.textContent = 'Upload Video';
      return;
    }
    
    showToast('Video uploaded successfully!', 'success');
    closeUploadModal();
    loadVideos();
  };
};

window.closeUploadModal = function() {
  document.getElementById('uploadModal')?.remove();
};

// Initialize app
async function init() {
  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
  }
  
  // Listen for auth changes
  sb.auth.onAuthStateChange((event, session) => {
    if (session) {
      currentUser = session.user;
    } else {
      currentUser = null;
    }
    updateAuthUI();
    loadVideos();
  });
  
  renderApp();
}

function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="navbar">
      <div class="logo" onclick="goHome()">APILAGE <span>TUBE</span></div>
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search videos..." onkeyup="if(event.key==='Enter'){currentSearch=this.value;loadVideos()}">
        <button onclick="currentSearch=document.getElementById('searchInput').value;loadVideos()"><i class="fas fa-search"></i></button>
      </div>
      <div style="display: flex; gap: 0.5rem;">
        <button class="upload-btn" onclick="openUploadModal()"><i class="fas fa-upload"></i> Upload</button>
        <div id="authContainer"></div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-item" onclick="goHome()"><i class="fas fa-home"></i> Home</div>
      <div class="sidebar-item" onclick="goTrending()"><i class="fas fa-fire"></i> Trending</div>
      <div class="sidebar-item" onclick="filterMyVideos()"><i class="fas fa-user"></i> My Videos</div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Categories</div>
      <div class="sidebar-item" onclick="setCategory('all')"><i class="fas fa-globe"></i> All</div>
      <div class="sidebar-item" onclick="setCategory('music')"><i class="fas fa-music"></i> Music</div>
      <div class="sidebar-item" onclick="setCategory('gaming')"><i class="fas fa-gamepad"></i> Gaming</div>
      <div class="sidebar-item" onclick="setCategory('tech')"><i class="fas fa-microchip"></i> Tech</div>
      <div class="sidebar-item" onclick="setCategory('education')"><i class="fas fa-graduation-cap"></i> Education</div>
      <div class="sidebar-item" onclick="setCategory('sports')"><i class="fas fa-futbol"></i> Sports</div>
      <div class="sidebar-item" onclick="setCategory('vlogs')"><i class="fas fa-video"></i> Vlogs</div>
      <div class="sidebar-item" onclick="setCategory('comedy')"><i class="fas fa-laugh"></i> Comedy</div>
      <div class="sidebar-item" onclick="setCategory('news')"><i class="fas fa-newspaper"></i> News</div>
    </div>
    <div class="main-content">
      <div class="section-header">
        <div class="section-title" id="pageTitle">All Videos <span class="live-badge">LIVE</span></div>
      </div>
      <div id="videoGrid" class="video-grid"></div>
      <div id="loader" class="loader"><div class="spinner"></div></div>
    </div>
  `;
  
  updateAuthUI();
  loadVideos();
}

window.setCategory = function(cat) {
  currentCategory = cat;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('pageTitle').innerHTML = cat === 'all' ? 'All Videos <span class="live-badge">LIVE</span>' : cat.charAt(0).toUpperCase() + cat.slice(1);
  loadVideos();
};

// Start the app
init();
</script>
</body>
</html>
