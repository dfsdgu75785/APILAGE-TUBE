<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APILAGE TUBE - Real-time Video Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }
    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: #0f0f0f;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
    }
    .logo span { color: #ff4444; }
    .search-bar {
      flex: 1;
      max-width: 600px;
      margin: 0 20px;
      display: flex;
    }
    .search-bar input {
      flex: 1;
      background: #121212;
      border: 1px solid #2a2a2a;
      border-radius: 40px 0 0 40px;
      padding: 8px 16px;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .search-bar button {
      background: #2a2a2a;
      border: 1px solid #2a2a2a;
      border-left: none;
      border-radius: 0 40px 40px 0;
      padding: 8px 20px;
      color: #aaa;
      cursor: pointer;
    }
    .btn-upload, .btn-signin {
      background: #2a2a2a;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      margin-left: 8px;
    }
    .btn-upload { background: #ff4444; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #ff4444;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-left: 8px;
    }
    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 56px;
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #0f0f0f;
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 24px;
      cursor: pointer;
      color: #aaa;
      border-radius: 10px;
      margin: 0 8px;
    }
    .sidebar-item:hover { background: #272727; color: white; }
    .sidebar-item i { width: 22px; }
    .sidebar-divider { height: 1px; background: #2a2a2a; margin: 12px 16px; }
    .sidebar-label { font-size: 12px; color: #777; padding: 8px 24px; }
    /* Main Content */
    .main-content {
      margin-left: 220px;
      margin-top: 56px;
      padding: 20px;
      min-height: calc(100vh - 56px);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 600;
    }
    .live-badge {
      background: #ff4444;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 10px;
    }
    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .video-card {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .video-card:hover { transform: translateY(-2px); }
    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 11px;
    }
    .video-info {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .channel-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .video-details h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-details p {
      font-size: 12px;
      color: #aaa;
    }
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      border: 1px solid #2a2a2a;
    }
    .modal h2 { margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px;
      color: white;
    }
    .btn-primary {
      background: #ff4444;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-secondary {
      background: #2a2a2a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      border-radius: 40px;
      background: #2a2a2a;
      color: #aaa;
    }
    .auth-tab.active {
      background: #ff4444;
      color: white;
    }
    .player-overlay {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 300;
      display: none;
      overflow-y: auto;
    }
    .player-overlay.open { display: block; }
    .player-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .video-player video {
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
      border-radius: 12px;
    }
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 400;
    }
    .toast {
      background: #1a1a1a;
      border-left: 3px solid #ff4444;
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 8px;
    }
    .loader {
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a2a;
      border-top-color: #ff4444;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-220px); }
      .main-content { margin-left: 0; }
    }
  </style>
</head>

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let allVideos = [];
let currentCategory = 'all';

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatViews(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function getTimeAgo(ts) {
  if (!ts) return '';
  const seconds = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return Math.floor(seconds/60) + 'm ago';
  if (seconds < 86400) return Math.floor(seconds/3600) + 'h ago';
  return Math.floor(seconds/86400) + 'd ago';
}

// Load videos from database
async function loadVideos() {
  const grid = document.getElementById('videoGrid');
  const loader = document.getElementById('loader');
  if (loader) loader.style.display = 'flex';
  
  let query = sb.from('videos').select('*').order('created_at', { ascending: false });
  if (currentCategory !== 'all') query = query.eq('category', currentCategory);
  
  const { data, error } = await query;
  if (loader) loader.style.display = 'none';
  
  if (error) {
    showToast('Error loading videos: ' + error.message, 'error');
    console.error('Load error:', error);
    return;
  }
  
  allVideos = data || [];
  console.log('Loaded videos:', allVideos.length);
  
  if (!grid) return;
  
  if (allVideos.length === 0) {
    grid.innerHTML = `<div style="text-align:center;padding:60px;color:#777">No videos yet. Be the first to upload!</div>`;
    return;
  }
  
  grid.innerHTML = allVideos.map(v => `
    <div class="video-card" onclick="openPlayer('${v.id}')">
      <div class="thumbnail">
        <img src="${v.thumbnail_url || 'https://placehold.co/480x270/1a1a1a/fff?text=🎬'}" onerror="this.src='https://placehold.co/480x270/1a1a1a/fff?text=🎬'">
        <div class="duration">${v.duration || '0:00'}</div>
      </div>
      <div class="video-info">
        <div class="channel-icon">${(v.username || 'U').charAt(0).toUpperCase()}</div>
        <div class="video-details">
          <h3>${escapeHtml(v.title)}</h3>
          <p>${escapeHtml(v.username || 'Unknown')} • ${formatViews(v.views)} views • ${getTimeAgo(v.created_at)}</p>
        </div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Open video player
window.openPlayer = async function(videoId) {
  const video = allVideos.find(v => v.id === videoId);
  if (!video) return;
  
  // Increment view count
  await sb.from('videos').update({ views: (video.views || 0) + 1 }).eq('id', videoId);
  video.views = (video.views || 0) + 1;
  
  const overlay = document.createElement('div');
  overlay.className = 'player-overlay open';
  overlay.id = 'playerModal';
  overlay.innerHTML = `
    <div class="player-container">
      <button onclick="closePlayer()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;margin-bottom:16px;">← Back</button>
      <div class="video-player">
        <video controls autoplay src="${video.video_url}"></video>
      </div>
      <h3 style="margin:16px 0 8px">${escapeHtml(video.title)}</h3>
      <p style="color:#aaa;margin-bottom:16px">${formatViews(video.views)} views • ${getTimeAgo(video.created_at)}</p>
      <div style="background:#1a1a1a;padding:16px;border-radius:12px;margin:16px 0">
        <p><strong>${escapeHtml(video.username || 'Unknown User')}</strong></p>
        <p style="color:#aaa;margin-top:8px">${escapeHtml(video.description || 'No description')}</p>
      </div>
      <div>
        <h4>Comments</h4>
        <div id="commentsList" style="margin:16px 0"></div>
        ${currentUser ? `
          <div style="display:flex;gap:8px;margin-top:16px">
            <input type="text" id="commentInput" placeholder="Add a comment..." style="flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:40px;padding:10px 16px;color:white">
            <button onclick="postComment('${video.id}')" style="background:#ff4444;border:none;padding:10px 20px;border-radius:40px;color:white;cursor:pointer">Post</button>
          </div>
        ` : '<p><button onclick="openAuthModal()" style="background:#ff4444;border:none;padding:8px 16px;border-radius:40px;color:white;cursor:pointer">Sign in</button> to comment</p>'}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  await loadComments(video.id);
};

window.closePlayer = function() {
  document.getElementById('playerModal')?.remove();
};

async function loadComments(videoId) {
  const { data } = await sb.from('comments').select('*').eq('video_id', videoId).order('created_at', { ascending: false });
  const container = document.getElementById('commentsList');
  if (!container) return;
  if (!data || data.length === 0) {
    container.innerHTML = '<p style="color:#777">No comments yet.</p>';
    return;
  }
  container.innerHTML = data.map(c => `
    <div style="background:#1a1a1a;border-radius:8px;padding:12px;margin-bottom:8px">
      <strong>${escapeHtml(c.username)}</strong>
      <p style="margin-top:4px">${escapeHtml(c.text)}</p>
      <p style="font-size:11px;color:#777;margin-top:4px">${getTimeAgo(c.created_at)}</p>
    </div>
  `).join('');
}

window.postComment = async function(videoId) {
  const input = document.getElementById('commentInput');
  const text = input?.value.trim();
  if (!text) return;
  await sb.from('comments').insert({
    video_id: videoId,
    user_id: currentUser.id,
    username: currentUser.email?.split('@')[0] || 'User',
    text: text
  });
  input.value = '';
  await loadComments(videoId);
  showToast('Comment posted!', 'success');
};

// Upload modal
window.openUploadModal = function() {
  if (!currentUser) { openAuthModal(); return; }
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'uploadModal';
  modal.innerHTML = `
    <div class="modal">
      <h2><i class="fas fa-upload"></i> Upload Video</h2>
      <div class="field"><label>Title *</label><input type="text" id="uploadTitle" placeholder="Video title"></div>
      <div class="field"><label>Description</label><input type="text" id="uploadDesc" placeholder="Description"></div>
      <div class="field"><label>Category</label>
        <select id="uploadCat">
          <option value="other">Other</option><option value="music">Music</option><option value="gaming">Gaming</option>
          <option value="tech">Tech</option><option value="education">Education</option><option value="sports">Sports</option>
          <option value="vlogs">Vlogs</option><option value="comedy">Comedy</option>
        </select>
      </div>
      <div class="field"><label>Video File (MP4, MOV, WebM)</label><input type="file" id="videoFile" accept="video/*"></div>
      <div class="field"><label>Thumbnail Image (optional)</label><input type="file" id="thumbFile" accept="image/*"></div>
      <div id="uploadProgress" style="display:none;margin:10px 0"><div style="background:#2a2a2a;border-radius:40px;height:6px"><div id="progressBar" style="width:0%;height:100%;background:#ff4444;border-radius:40px"></div></div><p style="font-size:12px;margin-top:5px" id="progressText">Uploading...</p></div>
      <button class="btn-primary" id="doUploadBtn">Upload</button>
      <button class="btn-secondary" onclick="closeUploadModal()">Cancel</button>
      <div id="uploadError" style="color:#ff4444;font-size:12px;margin-top:10px;text-align:center"></div>
    </div>
  `;
  document.body.appendChild(modal);
  
  document.getElementById('doUploadBtn').onclick = async () => {
    const title = document.getElementById('uploadTitle').value.trim();
    if (!title) { document.getElementById('uploadError').innerText = 'Title is required'; return; }
    const videoFile = document.getElementById('videoFile').files[0];
    if (!videoFile) { document.getElementById('uploadError').innerText = 'Select a video file'; return; }
    
    const btn = document.getElementById('doUploadBtn');
    btn.disabled = true;
    btn.textContent = 'Uploading...';
    document.getElementById('uploadProgress').style.display = 'block';
    
    const ext = videoFile.name.split('.').pop();
    const fileName = `${currentUser.id}/${Date.now()}.${ext}`;
    
    // Upload to Supabase Storage
    const { error: uploadError } = await sb.storage.from('videos').upload(fileName, videoFile);
    if (uploadError) {
      document.getElementById('uploadError').innerText = 'Upload failed: ' + uploadError.message;
      btn.disabled = false;
      return;
    }
    
    const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(fileName);
    
    // Upload thumbnail if provided
    let thumbnailUrl = null;
    const thumbFile = document.getElementById('thumbFile').files[0];
    if (thumbFile) {
      const thumbExt = thumbFile.name.split('.').pop();
      const thumbName = `${currentUser.id}/thumb_${Date.now()}.${thumbExt}`;
      await sb.storage.from('thumbnails').upload(thumbName, thumbFile);
      const { data: thumbData } = sb.storage.from('thumbnails').getPublicUrl(thumbName);
      thumbnailUrl = thumbData.publicUrl;
    }
    
    // Save to database
    const { error: dbError } = await sb.from('videos').insert({
      user_id: currentUser.id,
      username: currentUser.email?.split('@')[0] || 'User',
      title: title,
      description: document.getElementById('uploadDesc').value,
      category: document.getElementById('uploadCat').value,
      video_url: publicUrl,
      thumbnail_url: thumbnailUrl,
      views: 0,
      likes: 0
    });
    
    if (dbError) {
      document.getElementById('uploadError').innerText = 'Database error: ' + dbError.message;
      btn.disabled = false;
      return;
    }
    
    showToast('Video uploaded successfully!', 'success');
    closeUploadModal();
    loadVideos();
  };
};

window.closeUploadModal = function() {
  document.getElementById('uploadModal')?.remove();
};

// Auth Modal
window.openAuthModal = function() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'authModal';
  modal.innerHTML = `
    <div class="modal">
      <h2>APILAGE TUBE</h2>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('signin')">Sign In</div>
        <div class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div>
      </div>
      <div id="signinForm">
        <div class="field"><label>Email</label><input type="email" id="signinEmail"></div>
        <div class="field"><label>Password</label><input type="password" id="signinPassword"></div>
        <button class="btn-primary" onclick="handleSignIn()">Sign In</button>
      </div>
      <div id="signupForm" style="display:none">
        <div class="field"><label>Username</label><input type="text" id="signupName"></div>
        <div class="field"><label>Email</label><input type="email" id="signupEmail"></div>
        <div class="field"><label>Password (min 6 chars)</label><input type="password" id="signupPassword"></div>
        <button class="btn-primary" onclick="handleSignUp()">Create Account</button>
      </div>
      <div id="authError" style="color:#ff4444;font-size:12px;margin-top:10px;text-align:center"></div>
      <button class="btn-secondary" onclick="closeAuthModal()">Cancel</button>
    </div>
  `;
  document.body.appendChild(modal);
};

window.closeAuthModal = () => document.getElementById('authModal')?.remove();

window.switchAuthTab = (tab) => {
  document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  const tabs = document.querySelectorAll('.auth-tab');
  tabs[0].classList.toggle('active', tab === 'signin');
  tabs[1].classList.toggle('active', tab === 'signup');
};

window.handleSignIn = async () => {
  const email = document.getElementById('signinEmail').value.trim();
  const password = document.getElementById('signinPassword').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { document.getElementById('authError').innerText = error.message; return; }
  closeAuthModal();
  showToast('Signed in!', 'success');
  setTimeout(() => location.reload(), 500);
};

window.handleSignUp = async () => {
  const username = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (password.length < 6) { document.getElementById('authError').innerText = 'Password must be at least 6 characters'; return; }
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } });
  if (error) { document.getElementById('authError').innerText = error.message; return; }
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, username: username });
  }
  showToast('Account created! Please sign in.', 'success');
  switchAuthTab('signin');
  document.getElementById('signinEmail').value = email;
};

window.signOut = async () => {
  await sb.auth.signOut();
  currentUser = null;
  location.reload();
};

function updateAuthUI() {
  const container = document.getElementById('authContainer');
  if (!container) return;
  if (currentUser) {
    container.innerHTML = `<div class="avatar" onclick="toggleUserMenu()">${currentUser.email?.charAt(0).toUpperCase() || 'U'}</div><div id="userMenu" style="display:none;position:absolute;top:50px;right:20px;background:#1a1a1a;border-radius:12px;padding:8px;z-index:200"><div class="sidebar-item" onclick="signOut()">Sign Out</div></div>`;
  } else {
    container.innerHTML = `<button class="btn-signin" onclick="openAuthModal()"><i class="fas fa-sign-in-alt"></i> Sign In</button>`;
  }
}

window.toggleUserMenu = () => {
  const menu = document.getElementById('userMenu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
};

window.goHome = () => {
  currentCategory = 'all';
  document.getElementById('pageTitle').innerHTML = 'All Videos <span class="live-badge">LIVE</span>';
  loadVideos();
};

window.setCategory = (cat) => {
  currentCategory = cat;
  document.getElementById('pageTitle').innerHTML = cat === 'all' ? 'All Videos' : cat.charAt(0).toUpperCase() + cat.slice(1);
  loadVideos();
};

window.goTrending = async () => {
  const { data } = await sb.from('videos').select('*').order('views', { ascending: false }).limit(20);
  if (data) {
    allVideos = data;
    const grid = document.getElementById('videoGrid');
    if (grid) {
      grid.innerHTML = data.map(v => `
        <div class="video-card" onclick="openPlayer('${v.id}')">
          <div class="thumbnail"><img src="${v.thumbnail_url || 'https://placehold.co/480x270/1a1a1a/fff?text=🎬'}" onerror="this.src='https://placehold.co/480x270/1a1a1a/fff?text=🎬'"><div class="duration">${v.duration || '0:00'}</div></div>
          <div class="video-info"><div class="channel-icon">${(v.username || 'U').charAt(0).toUpperCase()}</div><div class="video-details"><h3>${escapeHtml(v.title)}</h3><p>${escapeHtml(v.username)} • ${formatViews(v.views)} views</p></div></div>
        </div>
      `).join('');
    }
  }
  document.getElementById('pageTitle').innerHTML = 'Trending 🔥';
};

// Initialize app
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) currentUser = session.user;
  
  sb.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    updateAuthUI();
    if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') loadVideos();
  });
  
  renderApp();
}

function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="navbar">
      <div class="logo" onclick="goHome()">APILAGE <span>TUBE</span></div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search videos...">
        <button onclick="currentCategory='all';currentSearch=document.getElementById('searchInput').value;loadVideos()"><i class="fas fa-search"></i></button>
      </div>
      <div style="display:flex">
        <button class="btn-upload" onclick="openUploadModal()"><i class="fas fa-upload"></i> Upload</button>
        <div id="authContainer"></div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-item" onclick="goHome()"><i class="fas fa-home"></i> Home</div>
      <div class="sidebar-item" onclick="goTrending()"><i class="fas fa-fire"></i> Trending</div>
      <div class="sidebar-item" onclick="openAuthModal()"><i class="fas fa-user"></i> My Channel</div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Categories</div>
      <div class="sidebar-item" onclick="setCategory('all')"><i class="fas fa-globe"></i> All</div>
      <div class="sidebar-item" onclick="setCategory('music')"><i class="fas fa-music"></i> Music</div>
      <div class="sidebar-item" onclick="setCategory('gaming')"><i class="fas fa-gamepad"></i> Gaming</div>
      <div class="sidebar-item" onclick="setCategory('tech')"><i class="fas fa-microchip"></i> Tech</div>
      <div class="sidebar-item" onclick="setCategory('education')"><i class="fas fa-graduation-cap"></i> Education</div>
      <div class="sidebar-item" onclick="setCategory('sports')"><i class="fas fa-futbol"></i> Sports</div>
      <div class="sidebar-item" onclick="setCategory('vlogs')"><i class="fas fa-video"></i> Vlogs</div>
      <div class="sidebar-item" onclick="setCategory('comedy')"><i class="fas fa-laugh"></i> Comedy</div>
    </div>
    <div class="main-content">
      <div class="section-header"><div class="section-title" id="pageTitle">All Videos <span class="live-badge">LIVE</span></div></div>
      <div id="videoGrid" class="video-grid"></div>
      <div id="loader" class="loader"><div class="spinner"></div></div>
    </div>
  `;
  updateAuthUI();
  loadVideos();
}

// Click outside to close user menu
document.addEventListener('click', (e) => {
  const menu = document.getElementById('userMenu');
  if (menu && !e.target.closest('#authContainer')) menu.style.display = 'none';
});

init();
</script>
</body>
</html>
